<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A polished analytics redirect experience built for Vercel." />
    <title>Visitor Analytics</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="background-orb orb-one"></div>
    <div class="background-orb orb-two"></div>
    <main class="hero-card">
      <div class="brand">Visitor Analytics</div>
      <h1>Track visits with elegance and redirect instantly.</h1>
      <p>
        Capture visitor context, notify your team in Telegram, and route users to your destination with a fast and modern experience.
      </p>
      <button id="startBtn" class="start-btn">Start</button>
      <div id="status" class="status" aria-live="polite"></div>
      <div id="loader" class="loader" hidden></div>
    </main>
    <footer>Built for Vercel • Node.js • Express • Serverless-ready</footer>
    <script src="/script.js"></script>
  </body>
</html>
